<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>企鹅旅行足迹🐧</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" href="./avatar/Penguins_of_madagascar.jpg" type="image/jpg">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            color-scheme: dark;
            --bg: #04050c;
            --panel: rgba(2, 6, 20, 0.8);
            --panel-border: rgba(49, 229, 255, 0.4);
            --panel-strong: rgba(255, 255, 255, 0.08);
            --accent: #10ffda;
            --accent-strong: #ff0fe0;
            --text-subtle: rgba(255, 255, 255, 0.68);
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, #0d1f5c, transparent 45%),
                        radial-gradient(circle at 80% 0%, #4a14ff, transparent 28%),
                        linear-gradient(180deg, #020510 0%, #050914 60%, #04060c 100%);
            color: #f5f5ff;
            font-family: 'Space Grotesk', 'SF Pro Display', system-ui, sans-serif;
        }
        .page {
            padding: 30px 48px 48px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .hero-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
        }
        .hero-panel h1 {
            margin: 0;
            font-size: clamp(36px, 3vw, 46px);
            letter-spacing: 0.08em;
        }
        .hero-panel p {
            margin: 8px 0 0;
        }
        .hero-panel .desc {
            color: var(--text-subtle);
            max-width: 640px;
        }
        .hero-panel .hero-controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 280px;
        }
        .hero-controls .friends-grid {
            cursor: default;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .hero-controls .mode-switch {
            border: 1px solid var(--panel-border);
            border-radius: 999px;
            padding: 6px;
            display: flex;
            gap: 6px;
            background: var(--panel-strong);
        }
        .mode-switch button {
            border: none;
            background: transparent;
            color: var(--text-subtle);
            padding: 6px 16px;
            border-radius: 999px;
            font-weight: 600;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .mode-switch button.active {
            background: linear-gradient(135deg, #2ff7ff 0%, #ff4ef1 100%);
            color: #04050c;
            box-shadow: 0 8px 20px rgba(255, 78, 241, 0.4);
        }
        .chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            transition: border 0.3s ease, transform 0.3s ease;
        }
        .chip:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .chip.ghost {
            border-style: dashed;
            color: rgba(255, 255, 255, 0.5);
        }
        .friend-chip {
            position: relative;
            gap: 8px;
            padding: 6px 14px 6px 8px;
            background: rgba(4, 12, 26, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
            --friend-color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
        }
        .friend-chip input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        .friend-chip img {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            object-fit: cover;
        }
        .friend-chip span {
            font-weight: 600;
        }
        .friend-chip.is-active {
            border-color: var(--friend-color);
            box-shadow: 0 0 16px rgba(255, 255, 255, 0.15), 0 0 30px var(--friend-color);
        }
        .filter-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .filter-title {
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-subtle);
        }
        .count-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .count-filter button {
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(10, 16, 30, 0.7);
            color: rgba(255, 255, 255, 0.7);
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.8rem;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .count-filter button.active {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.9), rgba(255, 68, 237, 0.9));
            color: #03050d;
            border-color: transparent;
            box-shadow: 0 8px 20px rgba(0, 255, 255, 0.2);
        }
        .content-grid {
            display: grid;
            grid-template-columns: 2.2fr 1fr;
            gap: 24px;
        }
        @media (max-width: 1100px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }
        .panel {
            background: var(--panel);
            border-radius: 20px;
            border: 1px solid var(--panel-border);
            padding: 18px;
            position: relative;
            backdrop-filter: blur(24px);
            box-shadow: 0 20px 40px rgba(2, 3, 22, 0.8);
            overflow: hidden;
        }
        .panel::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: inherit;
            pointer-events: none;
        }
        .panel-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .panel-title h2 {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 0.08em;
            font-weight: 500;
        }
        .panel-title .tag {
            padding: 4px 12px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        .map-panel {
            min-height: 620px;
            padding: 12px;
        }
        #main {
            width: 100%;
            height: 600px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: radial-gradient(circle at 30% 20%, rgba(0, 255, 240, 0.12), transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(255, 0, 200, 0.12), transparent 55%),
                        rgba(1, 4, 12, 0.9);
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }
        .stat-card {
            border-radius: 14px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            position: relative;
            overflow: hidden;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), transparent 60%);
            pointer-events: none;
        }
        .stat-card .label {
            margin: 0;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            color: var(--text-subtle);
        }
        .stat-card .value {
            margin: 8px 0 0;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 0.06em;
        }
        .stat-card .value .stat-sub {
            font-size: 0.85rem;
            color: var(--text-subtle);
            letter-spacing: 0.02em;
            font-weight: 500;
            margin-left: 6px;
        }
        .stat-card .hint {
            margin: 6px 0 0;
            font-size: 0.75rem;
            color: var(--text-subtle);
        }
        .chart-card {
            margin-bottom: 18px;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            min-height: 300px;
        }
        #statChart {
            width: 100%;
            height: 280px;
        }
        #provinceCoverageChart {
            width: 100%;
            height: 360px;
        }
        .coverage-panel {
            margin-top: 24px;
        }
        .insight-card {
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(3, 3, 12, 0.8);
        }
        .insight-summary {
            font-size: 0.9rem;
            color: var(--text-subtle);
            margin-bottom: 12px;
        }
        .insight-item {
            display: grid;
            grid-template-columns: 40px 1fr;
            gap: 12px;
            align-items: center;
            padding: 10px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .insight-item:first-child {
            border-top: none;
        }
        .insight-rank {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-weight: 600;
        }
        .insight-title {
            margin: 0;
            font-weight: 600;
        }
        .insight-value {
            margin: 4px 0 0;
            font-size: 0.9rem;
            color: #fff;
        }
        .insight-hint {
            margin: 2px 0 0;
            font-size: 0.75rem;
            color: var(--text-subtle);
        }
        .table-section {
            margin-top: 24px;
        }
        .province-table {
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(4, 6, 15, 0.85);
            padding: 16px;
        }
        .table-grid {
            display: grid;
            gap: 10px;
        }
        .table-row {
            display: grid;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.9rem;
            color: var(--text-subtle);
        }
        .table-row.table-row--province {
            grid-template-columns: 2fr 1fr 3fr;
        }
        .table-row.table-row--city {
            grid-template-columns: 1.7fr 1.2fr 0.8fr 3fr;
        }
        .table-row:last-child {
            border-bottom: none;
        }
        .table-head {
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.75rem;
        }
        .sort-btn {
            background: none;
            border: none;
            padding: 0;
            margin: 0;
            color: inherit;
            font: inherit;
            letter-spacing: inherit;
            text-transform: inherit;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s ease;
        }
        .sort-btn:hover {
            color: var(--accent);
        }
        .table-row .province-name {
            font-weight: 600;
            color: #fff;
        }
        .tag {
            display: inline-flex;
            padding: 4px 8px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.75rem;
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            margin-right: 6px;
        }
        /* ── Tablet (601px – 900px) ── */
        @media (max-width: 900px) {
            #main {
                height: 60vh;
            }
            .map-panel {
                min-height: 0;
            }
        }

        /* ── Mobile (≤ 600px) ── */
        @media (max-width: 600px) {
            body {
                padding-bottom: 40px;
            }
            .page {
                padding: 12px;
            }
            .hero-panel {
                gap: 10px;
            }
            .hero-panel h1 {
                font-size: clamp(1.15rem, 5vw, 1.5rem);
                letter-spacing: 0.04em;
            }
            .hero-controls {
                min-width: 0;
                width: 100%;
            }
            .mode-switch button {
                flex: 1;
                padding: 6px 8px;
                font-size: 0.82rem;
            }
            .count-filter button {
                padding: 5px 10px;
                font-size: 0.75rem;
            }
            .panel {
                padding: 12px;
            }
            .map-panel {
                min-height: 0;
                padding: 8px;
            }
            #main {
                height: 52vh;
                min-height: 260px;
            }
            .stat-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .stat-card {
                padding: 12px;
            }
            .stat-card .value {
                font-size: 1.4rem;
                margin-top: 6px;
            }
            .stat-card .value .stat-sub {
                font-size: 0.75rem;
            }
            .chart-card {
                min-height: 180px;
                padding: 10px;
            }
            #statChart {
                height: 180px;
            }
            .table-row {
                grid-template-columns: 1fr;
                gap: 4px;
            }
            .province-table {
                padding: 10px;
            }
            .panel-title h2 {
                font-size: 0.95rem;
            }
            .filter-title {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="hero-panel">
            <div>
                <p class="eyebrow" style="letter-spacing:0.2em;font-size:0.85rem;"> The Penguins' China Footprints 🇨🇳</p>
                <h1>马达加斯加企鹅的中国旅行足迹 🇨🇳</h1>
                <!-- <p class="desc">马达加斯加企鹅的流窜地图</p> -->
                <!-- <div id="heroChips" class="hero-chips" style="margin-top:12px;"></div> -->
            </div>
            <div class="hero-controls">
                <div class="friends-grid" id="friendToggles"></div>
                <div class="mode-switch">
                    <button data-mode="city" class="active">城市</button>
                    <button data-mode="province">省份</button>
                    <button data-mode="table">表格</button>
                </div>
                <div class="filter-panel">
                    <div class="filter-title">访问🐧数筛选</div>
                    <div class="count-filter">
                        <button data-count="0" class="active">0 🐧</button>
                        <button data-count="1" class="active">1 🐧</button>
                        <button data-count="2" class="active">2 🐧</button>
                        <button data-count="3" class="active">3 🐧</button>
                        <button data-count="4" class="active">4 🐧</button>
                    </div>
                </div>
            </div>
        </header>
        <section class="content-grid">
            <article class="panel map-panel">
                <div class="panel-title">
                    <h2>足迹地图 🗺️</h2>
                    <!-- <span class="tag">实时渲染</span> -->
                </div>
                <div id="main"></div>
            </article>
            <article class="panel" id="statsPanel">
                <div class="panel-title">
                    <h2>足迹统计 👣</h2>
                    <!-- <span class="tag">insights V2</span> -->
                </div>
                <div class="stat-grid">
                    <article class="stat-card">
                        <div class="label" id="labelTotal">覆盖省份</div>
                        <div class="value" data-stat="totalProvinces">0</div>
                        <div class="hint" id="hintTotal">整体覆盖的数量</div>
                    </article>
                    <article class="stat-card">
                        <div class="label" id="labelTop">头号出行企鹅</div>
                        <div class="value" data-stat="topFriend">-</div>
                        <div class="hint" id="hintTop">访问省份数最多的企鹅</div>
                    </article>
                    <article class="stat-card">
                        <div class="label" id="labelShared">重合省份</div>
                        <div class="value" data-stat="sharedProvinces">0</div>
                        <div class="hint" id="hintShared"> 两🐧以上去过 </div>
                    </article>
                    <article class="stat-card">
                        <div class="label" id="labelLonely">独行省份</div>
                        <div class="value" data-stat="lonelyProvinces">0</div>
                        <div class="hint" id="hintLonely">仅一🐧去过的省份</div>
                    </article>

                </div>
                <div class="chart-card">
                    <h3 id="chartTitle" style="margin:0 0 10px;font-size:0.9rem;letter-spacing:0.08em;">每只企鹅覆盖省份</h3>
                    <div id="statChart"></div>
                </div>
                <!-- <div class="insight-card">
                    <div class="insight-summary" id="insightSummary">正在计算...</div>
                    <div id="insightList"></div>
                </div> -->
            </article>
        </section>
        <section class="table-section" id="tableSection" style="display:none;">
            <section class="panel coverage-panel" id="coverageCard" style="display:none;">
                <div class="panel-title">
                    <h2>省级覆盖率对比（城市维度）</h2>
                    <span class="tag">覆盖/重合</span>
                </div>
                <div id="provinceCoverageChart"></div>
            </section>
            <div class="panel province-table">
                <div class="panel-title">
                    <h2>省份访问矩阵</h2>
                    <span class="tag">清单视图</span>
                </div>
                <div id="table"></div>
            </div>
            <div class="panel province-table" style="margin-top:24px;">
                <div class="panel-title">
                    <h2>城市访问矩阵</h2>
                    <span class="tag">清单视图</span>
                </div>
                <div id="cityTable"></div>
            </div>
        </section>
    </div>
    <script>
        const friendMeta = {
            Skipper: { color: '#35d6ff', avatar: 'avatar/Skipper.webp' },
            Kowalski: { color: '#7cff6b', avatar: 'avatar/Kowalski_1.webp' },
            Private: { color: '#ffb347', avatar: 'avatar/Private.webp' },
            Rico: { color: '#ff5fa2', avatar: 'avatar/Rico_1.webp' }
        };
        const friends = Object.keys(friendMeta);
        let baseData = null;
        let provinceVisit = {};
        let summaryByMode = { city: [], province: [] };
        let cityToProvince = {};
        let currentMode = 'city';
        let currentMapMode = 'city';
        let selectedCounts = new Set([0, 1, 2, 3, 4]);
        const tableSortState = {
            city: { key: 'count', dir: 'desc' },
            province: { key: 'count', dir: 'desc' }
        };
        const TOTAL_CITY_COUNT = 339;
        const TOTAL_PROVINCE_COUNT = 34;
        let provinceCityCounts = {};
        let cityProvinceFromCsv = {};
        let provinceCoverageData = [];

        const chart = echarts.init(document.getElementById('main'));
        const statChart = echarts.init(document.getElementById('statChart'));
        const coverageChart = echarts.init(document.getElementById('provinceCoverageChart'));
        const modeButtons = document.querySelectorAll('[data-mode]');
        const mapPanel = document.querySelector('.map-panel');
        const statsPanel = document.getElementById('statsPanel');
        const tableSection = document.getElementById('tableSection');
        const tableElement = document.getElementById('table');
        const cityTableElement = document.getElementById('cityTable');
        const heroChips = document.getElementById('heroChips');
        const friendToggleContainer = document.getElementById('friendToggles');
        const countButtons = document.querySelectorAll('.count-filter button');
        const coverageCard = document.getElementById('coverageCard');

        function renderFriendToggles() {
            friendToggleContainer.innerHTML = friends.map(friend => {
                const meta = friendMeta[friend];
                return `<label class="chip friend-chip is-active" style="--friend-color:${meta.color}">
                    <input type="checkbox" checked value="${friend}" class="friend-toggle">
                    <img src="${meta.avatar}" alt="${friend}">
                    <span>${friend}</span>
                </label>`;
            }).join('');
        }

        renderFriendToggles();
        const friendInputs = friendToggleContainer.querySelectorAll('.friend-toggle');

        modeButtons.forEach(btn => btn.addEventListener('click', () => {
            const mode = btn.dataset.mode;
            currentMode = mode;
            if (mode !== 'table') {
                currentMapMode = mode;
            }
            modeButtons.forEach(b => b.classList.toggle('active', b === btn));
            switchView();
        }));

        friendInputs.forEach(input => {
            input.addEventListener('change', () => {
                const label = input.closest('.friend-chip');
                if (label) label.classList.toggle('is-active', input.checked);
                updateDashboard();
                updateMap();
                updateHeroChips();
            });
        });

        countButtons.forEach(button => {
            button.addEventListener('click', () => {
                const count = Number(button.dataset.count);
                if (selectedCounts.has(count)) {
                    selectedCounts.delete(count);
                    button.classList.remove('active');
                } else {
                    selectedCounts.add(count);
                    button.classList.add('active');
                }
                updateDashboard();
                updateMap();
            });
        });

        tableElement.addEventListener('click', event => {
            const button = event.target.closest('[data-sort]');
            if (!button) return;
            const key = button.dataset.sort;
            const state = tableSortState['province'];
            if (state.key === key) {
                state.dir = state.dir === 'asc' ? 'desc' : 'asc';
            } else {
                state.key = key;
                state.dir = key === 'count' ? 'desc' : 'asc';
            }
            renderTable(summaryByMode['province'] || [], 'province', tableElement);
        });

        cityTableElement.addEventListener('click', event => {
            const button = event.target.closest('[data-sort]');
            if (!button) return;
            const key = button.dataset.sort;
            const state = tableSortState['city'];
            if (state.key === key) {
                state.dir = state.dir === 'asc' ? 'desc' : 'asc';
            } else {
                state.key = key;
                state.dir = key === 'count' ? 'desc' : 'asc';
            }
            renderTable(summaryByMode['city'] || [], 'city', cityTableElement);
        });

        function getActiveFriends() {
            const active = Array.from(friendInputs).filter(cb => cb.checked).map(cb => cb.value);
            return active.length ? active : friends;
        }

        function updateHeroChips() {
            if (!heroChips) return;
            const active = getActiveFriends();
            if (!active.length) {
                heroChips.innerHTML = '<span class="chip ghost">正在等待好友上线</span>';
                return;
            }
            heroChips.innerHTML = active.map(friend => {
                const meta = friendMeta[friend];
                return `<span class="chip" style="border-color:${meta.color};">${friend}</span>`;
            }).join('');
        }

        function getCurrentDataMode() {
            return currentMapMode;
        }

        function updateModeText(mode) {
            const cityMode = mode !== 'province';
            const totalLabel = document.getElementById('labelTotal');
            const sharedLabel = document.getElementById('labelShared');
            const topHint = document.getElementById('hintTop');
            const lonelyLabel = document.getElementById('labelLonely');
            const lonelyHint = document.getElementById('hintLonely');
            const title = document.getElementById('chartTitle');

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim());
            const headers = lines[0].split(',').map(h => h.replace(/["\s]/g, '').trim());
            const cityIdx = headers.indexOf('行政区划名称');
            const provinceIdx = headers.indexOf('所属省级行政区');
            const friendIndex = {};
            friends.forEach(friend => {
                const idx = headers.indexOf(friend);
                if (idx !== -1) friendIndex[friend] = idx;
            });
            const data = {};
            const provinceCounts = {};
            const cityProvince = {};
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                if (cols.length <= cityIdx) continue;
                const name = cols[cityIdx].replace(/["\s]/g, '');
                if (!name) continue;
                if (provinceIdx !== -1 && cols[provinceIdx] != null) {
                    const provinceName = cols[provinceIdx].replace(/["\s]/g, '').trim();
                    if (provinceName) {
                        provinceCounts[provinceName] = (provinceCounts[provinceName] || 0) + 1;
                        cityProvince[name] = provinceName;
                    }
                }
                data[name] = {};
                friends.forEach(friend => {
                    const idx = friendIndex[friend];
                    if (idx == null) return;
                    const value = cols[idx] || '';
                    data[name][friend] = value.trim().toUpperCase() === 'Y';
                });
            }
            return {
                cityVisit: data,
                provinceCityCounts: provinceCounts,
                cityProvinceFromCsv: cityProvince
            };
        }

        function computeProvinceVisits(cityVisit) {
            const prov = {};
            const codeToProv = {};
            const provinceNames = new Set();
            window._provinceFeatures.forEach(feature => {
                const properties = feature.properties || {};
                if (properties.adcode && properties.name) {
                    const key = Math.floor(properties.adcode / 10000) * 10000;
                    codeToProv[key] = properties.name;
                    provinceNames.add(properties.name);
                }
            });
            window._allFeatures.forEach(feature => {
                const cname = (feature.properties && feature.properties.name) || '';
                const adcode = feature.properties && feature.properties.adcode;
                if (!cname || !adcode) return;
                const key = Math.floor(adcode / 10000) * 10000;
                const pname = codeToProv[key];
                if (!pname) return;
                if (!prov[pname]) prov[pname] = emptyVisitRecord();
                const cityVisits = cityVisit[cname] || {};
                friends.forEach(friend => {
                    if (cityVisits[friend]) {
                        prov[pname][friend] = true;
                    }
                });
            });
            Object.entries(cityVisit).forEach(([name, visits]) => {
                if (!provinceNames.has(name)) return;
                if (!prov[name]) prov[name] = emptyVisitRecord();
                friends.forEach(friend => {
                    if (visits[friend]) {
                        prov[name][friend] = true;
                    }
                });
            });
            return prov;
        }

        function buildCityToProvinceMap(cityFeatures, provinceFeatures) {
            const codeToProv = {};
            const provinceNames = new Set();
            (provinceFeatures || []).forEach(feature => {
                const properties = feature.properties || {};
                if (properties.adcode && properties.name) {
                    const key = Math.floor(properties.adcode / 10000) * 10000;
                    codeToProv[key] = properties.name;
                    provinceNames.add(properties.name);
                }
            });
            const map = {};
            (cityFeatures || []).forEach(feature => {
                const properties = feature.properties || {};
                const name = properties.name;
                const adcode = properties.adcode;
                if (!name) return;
                let province = '';
                if (adcode) {
                    const key = Math.floor(adcode / 10000) * 10000;
                    province = codeToProv[key];
                }
                if (!province && provinceNames.has(name)) {
                    province = name;
                }
                map[name] = province || '—';
            });
            return map;
        }

        function emptyVisitRecord() {
            return friends.reduce((acc, friend) => {
                acc[friend] = false;
                return acc;
            }, {});
        }

        function hexToRgb(hex) {
            const raw = hex.replace('#', '');
            const full = raw.length === 3 ? raw.split('').map(c => c + c).join('') : raw;
            const num = parseInt(full, 16);
            return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
        }

        function mixColors(colors) {
            const total = colors.length || 1;
            const sum = colors.reduce((acc, color) => {
                const rgb = hexToRgb(color);
                acc.r += rgb.r;
                acc.g += rgb.g;
                acc.b += rgb.b;
                return acc;
            }, { r: 0, g: 0, b: 0 });
            return `rgb(${Math.round(sum.r / total)}, ${Math.round(sum.g / total)}, ${Math.round(sum.b / total)})`;
        }

        function colorForVisits(visits, activeFriends) {
            const visited = activeFriends.filter(friend => visits[friend]);
            if (!visited.length) return 'rgba(10, 14, 24, 0.95)';
            if (visited.length === 1) return friendMeta[visited[0]].color;
            return mixColors(visited.map(friend => friendMeta[friend].color));
        }

        function buildSummary(visitsByName, features) {
            const summary = [];
            (features || []).forEach(feature => {
                const name = feature.properties && feature.properties.name;
                if (!name) return;
                const visits = visitsByName[name] || emptyVisitRecord();
                const visitors = friends.filter(friend => visits[friend]);
                if (!visitors.length) return;
                summary.push({ name, count: visitors.length, friends: visitors });
            });
            return summary;
        }

        function buildProvinceCoverageData(activeFriends) {
            let counts = provinceCityCounts;
            if (!Object.keys(counts).length && Object.keys(cityProvinceFromCsv).length) {
                counts = Object.values(cityProvinceFromCsv).reduce((acc, province) => {
                    if (!province) return acc;
                    acc[province] = (acc[province] || 0) + 1;
                    return acc;
                }, {});
            }
            const data = [];
            Object.entries(counts).forEach(([province, total]) => {
                if (!total) return;
                let visited = 0;
                let shared = 0;
                Object.entries(baseData || {}).forEach(([city, visits]) => {
                    if (cityProvinceFromCsv[city] !== province) return;
                    const count = activeFriends.reduce((sum, friend) => sum + (visits[friend] ? 1 : 0), 0);
                    if (count >= 1) visited += 1;
                    if (count >= 2) shared += 1;
                });
                const coverage = total ? visited / total : 0;
                const overlap = total ? shared / total : 0;
                data.push({ province, total, visited, shared, coverage, overlap });
            });
            return data.sort((a, b) => {
                if (b.coverage !== a.coverage) return b.coverage - a.coverage;
                if (b.total !== a.total) return b.total - a.total;
                if (b.overlap !== a.overlap) return b.overlap - a.overlap;
                return a.province.localeCompare(b.province, 'zh-CN');
            });
        }

        function generateStatSnapshot(summary) {
            const totalProvinces = summary.length;
            const sharedCount = summary.filter(item => item.count >= 2).length;
            const lonelyList = summary.filter(item => item.count === 1);
            const friendMap = friends.reduce((acc, friend) => { acc[friend] = []; return acc; }, {});
            summary.forEach(item => {
                item.friends.forEach(friend => friendMap[friend].push(item.name));
            });
            const ranking = friends.map(friend => ({ friend, count: friendMap[friend].length }));
            const sortedRanking = [...ranking].sort((a, b) => b.count - a.count);
            const topFriend = sortedRanking[0] || { friend: '-', count: 0 };
            const topShared = [...summary].sort((a, b) => {
                if (b.count !== a.count) return b.count - a.count;
                return a.name.localeCompare(b.name, 'zh-CN');
            }).slice(0, 3);
            const lonelyNames = lonelyList.map(item => `${item.name} (${item.friends[0] || '-'})`);
            return {
                totalProvinces,
                sharedCount,
                lonelyCount: lonelyNames.length,
                lonelyNames,
                friendRanking: sortedRanking,
                topFriend,
                topShared
            };
        }

        function renderTable(summary, mode = 'province', targetEl = tableElement) {
            const withProvince = mode === 'city';
            const state = tableSortState[mode] || { key: 'count', dir: 'desc' };
            const enriched = summary.map(item => ({
                ...item,
                province: withProvince ? (cityToProvince[item.name] || '—') : null
            }));
            const sorted = [...enriched].sort((a, b) => {
                const dir = state.dir === 'asc' ? 1 : -1;
                if (state.key === 'count') {
                    const diff = (a.count - b.count) * dir;
                    return diff || a.name.localeCompare(b.name, 'zh-CN');
                }
                if (state.key === 'province' && withProvince) {
                    const diff = (a.province || '').localeCompare(b.province || '', 'zh-CN') * dir;
                    return diff || a.name.localeCompare(b.name, 'zh-CN');
                }
                const diff = a.name.localeCompare(b.name, 'zh-CN') * dir;
                return diff || b.count - a.count;
            });
            if (!sorted.length) {
                targetEl.innerHTML = '<p style="color: var(--text-subtle);">暂无有效数据。</p>';
                return;
            }
            const rows = sorted.map(item => {
                const friendTags = item.friends.map(friend => `<span class="tag">${friend}</span>`).join('');
                return `<div class="table-row ${withProvince ? 'table-row--city' : 'table-row--province'}">
                    <div class="province-name">${item.name}</div>
                    ${withProvince ? `<div>${item.province}</div>` : ''}
                    <div>${item.count}</div>
                    <div>${friendTags}</div>
                </div>`;
            }).join('');
            const header = mode === 'province' ? '省份 / 直辖市' : '地级市';
            const nameLabel = state.key === 'name' ? `${header} ${state.dir === 'asc' ? '↑' : '↓'}` : header;

                        <div><button class="sort-btn" data-sort="name">${nameLabel}</button></div>

                        <div><button class="sort-btn" data-sort="count">${countLabel}</button></div>
                        <div>企鹅</div>
                    </div>
                    ${rows}
                </div>`;
        }

            const visitData = visitPayload.cityVisit || visitPayload;
            provinceCityCounts = visitPayload.provinceCityCounts || {};
            cityProvinceFromCsv = visitPayload.cityProvinceFromCsv || {};
            buildMapData(visitData);
        }).catch(err => {
            console.error('加载失败', err);
        });

        window.addEventListener('resize', () => {
            chart.resize();
            statChart.resize();
            coverageChart.resize();
        });
    </script>
</body>
</html>
